name: build

on:
  - push
  - pull_request
  - workflow_dispatch

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - name: Export env vars
        run: buildscripts/include/ci.sh export >>$GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"
          enableCrossOsArchive: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install autoconf pkgconf libtool ninja-build python3-pip gperf
          sudo pip3 install meson

      - name: Download deps
        run: |
          mkdir -p "$CACHE_FOLDER"
          buildscripts/include/ci.sh install
        env:
          CACHE_MODE: "folder"
          CACHE_FOLDER: "${{ github.workspace }}/gh-cache"

      - name: Build
        run: |
          set -o pipefail
          buildscripts/include/ci.sh build 2>&1 | tee ci-build.log

      - name: Collect build logs on failure
        if: failure()
        run: |
          mkdir -p ci-logs
          if [ -f ci-build.log ]; then cp ci-build.log ci-logs/; fi
          python3 - <<'PY'
          import pathlib, shutil
          root = pathlib.Path("buildscripts/deps")
          out = pathlib.Path("ci-logs")
          patterns = ("**/meson-logs/meson-log.txt", "**/ffbuild/config.log", "**/config.log")
          for pat in patterns:
            for src in root.glob(pat):
              rel = src.relative_to(root)
              dst = out / rel
              dst.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(src, dst)
          print("collected logs:", len(list(out.rglob('*'))))
          PY

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-failure-logs
          path: ci-logs/
          if-no-files-found: warn

      - name: Verify universal APK contains v7a and v8a
        run: |
          unzip -l app/build/outputs/apk/default/debug/app-default-universal-debug.apk | grep -q "lib/armeabi-v7a/libmpv.so"
          unzip -l app/build/outputs/apk/default/debug/app-default-universal-debug.apk | grep -q "lib/arm64-v8a/libmpv.so"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mpv-android
          path: |
            app/build/outputs/apk/default/debug/app-default-universal-debug.apk
          if-no-files-found: error
          
